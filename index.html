<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<!-- Global Error Trap for mobile debugging -->
		<script>
			window.onerror = function(msg, url, line, col, error) {
				var div = document.createElement('div');
				div.style.position = 'fixed';
				div.style.top = '0';
				div.style.left = '0';
				div.style.width = '100%';
				div.style.height = '100%';
				div.style.backgroundColor = 'white';
				div.style.color = 'red';
				div.style.zIndex = '9999';
				div.style.padding = '20px';
				div.style.overflow = 'auto';
				div.innerHTML = '<h3>Startup Error</h3>' +
					'<p><strong>Message:</strong> ' + msg + '</p>' +
					'<p><strong>URL:</strong> ' + url + '</p>' +
					'<p><strong>Line:</strong> ' + line + '</p>' +
					'<pre>' + (error ? error.stack : 'No stack trace') + '</pre>';
				document.body.appendChild(div);
			};
		</script>
		<link rel="icon" type="image/png" href="/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="My name is Iman, and I am a full stack developer and chartered civil engineer. I am currently a senior engineer at Ramboll. This portfolio showcases some of my software development projects."
		/>
		
		<!-- Cache control -->
		<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
		<meta http-equiv="Pragma" content="no-cache" />
		<meta http-equiv="Expires" content="0" />

		<!-- Preload critical resources -->
		<link rel="preload" href="/src/main.tsx" as="script" />
		<link rel="preload" href="/src/styles.css" as="style" />
		
		<!-- Preconnect to external domains -->
		<link rel="preconnect" href="https://cloud.umami.is" crossorigin />
		
		<!-- DNS prefetch for faster resource loading -->
		<link rel="dns-prefetch" href="https://cloud.umami.is" />
		
		<!-- Critical CSS inlined -->
		<style>
			/* Critical above-the-fold styles */
			html{-webkit-overflow-scrolling:touch;margin:0;padding:0;width:100%;overflow-x:hidden}
			body{-webkit-tap-highlight-color:transparent;margin:0;padding:0;width:100%;overflow-x:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeSpeed}
			#root{width:100%;overflow-x:hidden;min-height:100vh}
		</style>

	</head>

	</body>
</html>
